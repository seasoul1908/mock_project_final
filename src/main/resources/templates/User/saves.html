<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Saves - DevQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: var(--bg-body);
            padding-top: 60px;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Adjusted", "Segoe UI", "Liberation Sans", sans-serif;
        }

        .user-name {
            font-size: 34px;
            font-weight: normal;
            margin-bottom: 4px;
        }

        .user-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .saves-sidebar-item {
            display: block;
            padding: 6px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            border-radius: 100px;
            margin-bottom: 2px;
        }

        .saves-sidebar-item:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .saves-sidebar-item.active {
            font-weight: bold;
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .saves-sidebar-header {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .saved-item-card {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.1s;
        }

        .saved-item-card:hover {
            background-color: transparent;
        }

        .saved-item-title {
            font-size: 15px;
            color: var(--blue-link, #0074cc);
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }

        .saved-item-title:hover {
            color: var(--blue-hover, #0a95ff);
        }

        .saved-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .empty-state-box {
            background-color: var(--bg-panel);
            border: 1px dashed var(--border-color);
            border-radius: 5px;
            padding: 40px;
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
        }

        .modal-custom {
            display: none;
            position: fixed;
            z-index: 1050;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content-custom {
            background-color: var(--bg-panel);
            margin: 15% auto;
            padding: 20px;
            border: 1px solid var(--border-color);
            width: 400px;
            border-radius: 5px;
            color: var(--text-primary);
        }

        .close-custom {
            color: var(--text-secondary);
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-custom:hover {
            color: var(--text-primary);
        }

        .profile-tabs {
            border-bottom: none;
            margin-bottom: 20px;
        }

        .profile-tabs .nav-link {
            color: var(--text-secondary);
            border-radius: 100px;
            padding: 6px 12px;
            margin-right: 5px;
            border: none;
            font-size: 13px;
        }

        .profile-tabs .nav-link:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .profile-tabs .nav-link.active {
            background-color: var(--orange, #f48024);
            color: white;
            font-weight: 500;
        }

        /* Bố cục Sidebar dính chuẩn SO */
        .main-container {
            max-width: 1264px;
            margin: 0 auto;
            display: flex;
            align-items: stretch;
            background-color: transparent;
        }

        .left-sidebar {
            width: 164px;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
        }

        .main-content {
            flex-grow: 1;
            padding: 24px;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* So-list container */
        .so-list-container {
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-panel);
        }

        .btn-primary {
            background-color: var(--orange, #f48024);
            border-color: var(--orange, #f48024);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--orange-hover, #da680b);
            border-color: var(--orange-hover, #da680b);
            color: white;
        }

        .btn-outline-secondary {
            border-color: var(--border-color);
            color: var(--text-secondary);
            background-color: transparent;
        }

        .btn-outline-secondary:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .pagination-so {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .btn-so-page {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            padding: 0 8px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: background-color 0.1s;
        }

        .btn-so-page:hover {
            background-color: var(--bg-panel);
            color: var(--text-primary);
        }

        .btn-so-page.active {
            background-color: var(--orange, #f48024);
            border-color: var(--orange, #f48024);
            color: white;
            font-weight: 600;
        }
        
        /* Input group fixes */
        .input-group-text, .form-control {
            background-color: transparent !important;
            border-color: var(--border-color) !important;
            color: var(--text-primary) !important;
        }
        .input-group-text i {
            color: var(--text-secondary) !important;
        }
    </style>
</head>

<body>

    <div th:replace="~{Common/header :: header}"></div>

    <div class="main-container">

        <div class="left-sidebar d-none d-md-block">
            <div th:replace="~{Common/sidebar :: sidebar('saves')}"></div>
        </div>

        <main class="main-content">

            <div th:replace="~{Common/profileTemplate :: profileTemplate('saves')}"></div>

            <div class="row mt-4">
                <div class="col-md-2">
                    <nav class="nav flex-column">
                        <a th:href="@{/saves(colPage=${currentColPage})}" class="saves-sidebar-item"
                            th:classappend="${activeListId == null ? 'active' : ''}">
                            All saves
                        </a>

                        <div class="d-flex justify-content-between align-items-center px-2 mt-3">
                            <span class="saves-sidebar-header">MY LISTS</span>
                            <a href="javascript:void(0)"
                                onclick="document.getElementById('createListModal').style.display = 'block'"
                                class="text-decoration-none small">
                                <i class="fa-solid fa-plus text-secondary"></i>
                            </a>
                        </div>

                        <div class="mb-3 px-2">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text border-end-0 text-muted"><i
                                        class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" id="collectionSearchInput"
                                    class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Find a collection...">
                            </div>
                        </div>

                        <th:block th:each="col : ${myCollections}">
                            <div class="saves-sidebar-item collection-item d-flex justify-content-between align-items-center"
                                th:classappend="${activeListId == col.collectionId ? 'active' : ''}"
                                style="padding-right: 8px;">
                                <a th:href="@{/saves(listId=${col.collectionId}, colPage=${currentColPage})}"
                                    class="text-decoration-none text-truncate flex-grow-1 collection-name-text"
                                    style="max-width: 90px; color: inherit;" th:text="${col.name}">Collection Name</a>

                                <div class="d-flex">
                                    <a href="javascript:void(0)" class="text-secondary small ms-2 opacity-75"
                                        title="Rename"
                                        th:onclick="openRenameModal([[${col.collectionId}]], [[${col.name}]])">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <a th:href="@{/saves/delete(id=${col.collectionId})}"
                                        class="text-danger small ms-2 opacity-75" title="Delete"
                                        th:onclick="return confirm('Delete list: ' + [[${col.name}]] + '?');">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </a>
                                </div>
                            </div>
                        </th:block>

                        <th:block th:if="${totalColPages != null and totalColPages > 1}">
                            <div class="d-flex justify-content-center px-1 mt-4 mb-2">
                                <div class="pagination-so flex-nowrap" style="gap: 2px; margin: 0;">
                                    <a th:if="${currentColPage > 1}"
                                        th:href="@{/saves(listId=${activeListId}, page=${currentPage}, colPage=${currentColPage - 1})}"
                                        class="btn-so-page"
                                        style="min-width: 20px; height: 22px; padding: 0 4px; font-size: 11px;"><i
                                            class="fa-solid fa-angle-left"></i></a>

                                    <a th:each="i : ${#numbers.sequence(colStartPage, colEndPage)}"
                                        th:href="@{/saves(listId=${activeListId}, page=${currentPage}, colPage=${i})}"
                                        th:classappend="${currentColPage == i ? 'active' : ''}" class="btn-so-page"
                                        style="min-width: 20px; height: 22px; padding: 0 4px; font-size: 11px;"
                                        th:text="${i}">1</a>

                                    <a th:if="${currentColPage < totalColPages}"
                                        th:href="@{/saves(listId=${activeListId}, page=${currentPage}, colPage=${currentColPage + 1})}"
                                        class="btn-so-page"
                                        style="min-width: 20px; height: 22px; padding: 0 4px; font-size: 11px;"><i
                                            class="fa-solid fa-angle-right"></i></a>
                                </div>
                            </div>
                        </th:block>
                    </nav>
                </div>

                <div class="col-md-10 ps-md-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex flex-column w-100 me-3">
                            <div class="d-flex align-items-baseline mb-2">
                                <h3 class="mb-0 fw-bold" style="font-size: 24px; font-weight: 400 !important;"
                                    th:text="${currentListName}">All saves</h3>
                                <span class="text-muted ms-3" style="font-size: 14px;"
                                    th:text="${savedCount + ' saved items'}">0 saved items</span>
                            </div>
                            <div class="input-group input-group-sm mt-1" style="max-width: 400px;">
                                <span class="input-group-text border-end-0 text-muted"><i
                                        class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" id="savedItemSearchInput"
                                    class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Search in this list...">
                            </div>
                        </div>
                        <button class="btn btn-sm text-white text-nowrap btn-primary" style="border: none"
                            onclick="document.getElementById('createListModal').style.display = 'block'">
                            <i class="fa-solid fa-plus me-1"></i> Create new list
                        </button>
                    </div>

                    <th:block th:if="${#lists.isEmpty(savedList)}">
                        <div class="empty-state-box so-panel">
                            <i class="fa-solid fa-layer-group fa-3x text-secondary opacity-25"></i>
                            <p class="mt-3 text-muted fw-medium">You have no saved items here</p>
                        </div>
                    </th:block>

                    <th:block th:if="${not #lists.isEmpty(savedList)}">
                        <div class="so-list-container so-panel">
                            <div class="saved-item-card saved-item-row d-flex justify-content-between align-items-center"
                                th:each="item : ${savedList}">
                                <div>
                                    <a th:href="@{/question(id=${item.questionId})}"
                                        class="saved-item-title saved-title-text"
                                        th:text="${item.questionTitle}">Question Title</a>
                                    <div class="saved-meta mt-1">
                                        Saved on <span
                                            th:text="${#dates.format(item.createdAt, 'MMM dd, yyyy')}">Date</span>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center">
                                    <a href="javascript:void(0)" class="text-secondary small ms-3 text-decoration-none"
                                        th:onclick="openMoveModal([[${item.questionId}]])"><i
                                            class="fa-solid fa-folder-tree"></i> Move</a>
                                    <a th:href="@{/saves/remove(questionId=${item.questionId}, fromCollectionId=${activeListId})}"
                                        class="text-danger small ms-3 text-decoration-none"
                                        onclick="return confirm('Remove bookmark?');"><i
                                            class="fa-solid fa-bookmark-slash"></i> Unsave</a>
                                </div>
                            </div>
                        </div>

                        <div id="noSavedItemsFound" class="text-center p-4 d-none">
                            <p class="text-muted mb-0"><i class="fa-regular fa-face-frown"></i> No items match your
                                search.</p>
                        </div>

                        <th:block th:if="${totalItemPages != null and totalItemPages > 1}">
                            <div class="d-flex justify-content-end mt-4">
                                <div class="pagination-so">
                                    <a th:if="${currentPage > 1}"
                                        th:href="@{/saves(listId=${activeListId}, page=${currentPage - 1}, colPage=${currentColPage})}"
                                        class="btn-so-page">Prev</a>

                                    <a th:each="i : ${#numbers.sequence(itemStartPage, itemEndPage)}"
                                        th:href="@{/saves(listId=${activeListId}, page=${i}, colPage=${currentColPage})}"
                                        th:classappend="${currentPage == i ? 'active' : ''}" class="btn-so-page"
                                        th:text="${i}">1</a>

                                    <a th:if="${currentPage < totalItemPages}"
                                        th:href="@{/saves(listId=${activeListId}, page=${currentPage + 1}, colPage=${currentColPage})}"
                                        class="btn-so-page">Next</a>
                                </div>
                            </div>
                        </th:block>
                    </th:block>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="createListModal" class="modal-custom">
        <div class="modal-content-custom">
            <span onclick="document.getElementById('createListModal').style.display = 'none'"
                class="close-custom">&times;</span>
            <h4 style="margin-top: 0; font-size: 18px; font-weight: 500;">Create a new list</h4>
            <form th:action="@{/saves/create}" method="post">
                <div class="mb-3 mt-3">
                    <label class="form-label fw-bold small">List Name</label>
                    <input type="text" name="listName" class="form-control" placeholder="e.g. Java Tips"
                        required>
                </div>
                <div class="text-end mt-4">
                    <button type="button" onclick="document.getElementById('createListModal').style.display = 'none'"
                        class="btn btn-outline-secondary btn-sm me-2">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="renameListModal" class="modal-custom">
        <div class="modal-content-custom">
            <span onclick="document.getElementById('renameListModal').style.display = 'none'"
                class="close-custom">&times;</span>
            <h4 style="margin-top: 0; font-size: 18px; font-weight: 500;">Rename list</h4>
            <form th:action="@{/saves/rename}" method="post">
                <input type="hidden" id="renameCollectionId" name="collectionId" value="">
                <div class="mb-3 mt-3">
                    <label class="form-label fw-bold small">New List Name</label>
                    <input type="text" id="renameInput" name="newName" class="form-control" required>
                </div>
                <div class="text-end mt-4">
                    <button type="button" onclick="document.getElementById('renameListModal').style.display = 'none'"
                        class="btn btn-outline-secondary btn-sm me-2">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="moveBookmarkModal" class="modal-custom">
        <div class="modal-content-custom">
            <span onclick="document.getElementById('moveBookmarkModal').style.display = 'none'"
                class="close-custom">&times;</span>
            <h4 style="margin-top: 0; font-size: 18px; font-weight: 500;">Move saved item</h4>
            <form th:action="@{/saves/move}" method="post">
                <input type="hidden" id="moveQuestionId" name="questionId" value="">
                <div class="mb-4 mt-3">
                    <label class="form-label fw-bold small">Select destination list</label>
                    <select name="collectionId" class="form-select">
                        <option value="">-- All saves (No specific list) --</option>
                        <th:block th:each="col : ${allMyCollections}">
                            <option th:value="${col.collectionId}" th:text="${col.name}">Name</option>
                        </th:block>
                    </select>
                </div>
                <div class="text-end mt-4">
                    <button type="button" onclick="document.getElementById('moveBookmarkModal').style.display = 'none'"
                        class="btn btn-outline-secondary btn-sm me-2">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Move Item</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openRenameModal(id, currentName) {
            document.getElementById('renameCollectionId').value = id;
            document.getElementById('renameInput').value = currentName;
            document.getElementById('renameListModal').style.display = 'block';
        }
        function openMoveModal(questionId) {
            document.getElementById('moveQuestionId').value = questionId;
            document.getElementById('moveBookmarkModal').style.display = 'block';
        }
        window.addEventListener('click', function (event) {
            if (event.target == document.getElementById('createListModal')) document.getElementById('createListModal').style.display = "none";
            if (event.target == document.getElementById('renameListModal')) document.getElementById('renameListModal').style.display = "none";
            if (event.target == document.getElementById('moveBookmarkModal')) document.getElementById('moveBookmarkModal').style.display = "none";
        });

        // Tìm kiếm Collection
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById("collectionSearchInput");
            const collectionItems = document.querySelectorAll(".collection-item");
            if (searchInput) {
                searchInput.addEventListener("input", function () {
                    let filterText = this.value.toLowerCase().trim();
                    collectionItems.forEach(function (item) {
                        const nameTag = item.querySelector(".collection-name-text");
                        if (nameTag) {
                            let itemName = (nameTag.textContent || nameTag.innerText).toLowerCase().trim();
                            if (itemName.includes(filterText)) {
                                item.classList.remove("d-none"); item.classList.add("d-flex");
                            } else {
                                item.classList.remove("d-flex"); item.classList.add("d-none");
                            }
                        }
                    });
                });
            }
        });

        // Tìm kiếm Bài viết đã lưu
        document.addEventListener("DOMContentLoaded", function () {
            const itemSearchInput = document.getElementById("savedItemSearchInput");
            const savedItemRows = document.querySelectorAll(".saved-item-row");
            const noItemsMsg = document.getElementById("noSavedItemsFound");
            if (itemSearchInput) {
                itemSearchInput.addEventListener("input", function () {
                    let filterText = this.value.toLowerCase().trim();
                    let visibleCount = 0;
                    savedItemRows.forEach(function (row) {
                        const titleTag = row.querySelector(".saved-title-text");
                        if (titleTag) {
                            let titleText = (titleTag.textContent || titleTag.innerText).toLowerCase().trim();
                            if (titleText.includes(filterText)) {
                                row.classList.remove("d-none"); row.classList.add("d-flex");
                                visibleCount++;
                            } else {
                                row.classList.remove("d-flex"); row.classList.add("d-none");
                            }
                        }
                    });
                    if (visibleCount === 0 && savedItemRows.length > 0) noItemsMsg.classList.remove("d-none");
                    else noItemsMsg.classList.add("d-none");
                });
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{Common/footer :: footer}"></div>
</body>

</html>
