<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Drafts - DevQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if (localStorage.getItem('devquery-theme') === 'dark') {
            document.write('<style>body { background-color: #2d3135 !important; }</style>');
        }
    </script>
    <style>
        body {
            background-color: var(--bg-body, #fff);
            padding-top: 60px;
            font-size: 13px;
            color: var(--text-primary, #232629);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Adjusted", "Segoe UI", "Liberation Sans", sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-container {
            max-width: 1264px;
            margin: 0 auto;
            display: flex;
            align-items: stretch;
            background-color: transparent;
        }

        .left-sidebar {
            width: 164px;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color, #d6d9dc);
            transition: border-color 0.3s ease;
        }

        .main-content {
            flex-grow: 1;
            padding: 24px;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .draft-card {
            padding: 16px;
            border-bottom: 1px solid var(--border-color, #d6d9dc);
            background-color: var(--bg-panel, #fff);
            margin-bottom: 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color, #d6d9dc);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .draft-title {
            font-size: 16px;
            color: var(--blue-link, #0074cc);
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-bottom: 5px;
        }

        .draft-title:hover {
            color: var(--blue-hover, #0a95ff);
        }

        .draft-body-excerpt {
            color: var(--text-secondary, #525960);
            font-size: 13px;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.3s ease;
        }

        .draft-meta {
            font-size: 12px;
            color: var(--text-muted, #6a737c);
            transition: color 0.3s ease;
        }

        .empty-state-box {
            background-color: var(--bg-panel, #fff);
            border: 1px dashed var(--border-color, #d6d9dc);
            border-radius: 5px;
            padding: 40px;
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary, #525960);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        .btn-outline-primary {
            color: var(--blue-link, #0074cc);
            border-color: var(--blue-link, #0074cc);
        }

        .btn-outline-primary:hover {
            background-color: var(--blue-link, #0074cc);
            color: #fff;
            border-color: var(--blue-link, #0074cc);
        }
    </style>
</head>

<body>

    <div th:replace="~{Common/header :: header}"></div>

    <div class="main-container">

        <div class="left-sidebar d-none d-md-block">
            <div th:replace="~{Common/sidebar :: sidebar('profile')}"></div>
        </div>

        <main class="main-content">

            <div th:replace="~{Common/profileTemplate :: profileTemplate('drafts')}"></div>

            <div class="mt-4">
                <h3 class="mb-3" style="font-size: 20px; font-weight: 400;">Your Drafts</h3>

                <div th:if="${drafts == null or drafts.isEmpty()}" class="empty-state-box">
                    <i class="fa-solid fa-file-pen fa-3x text-secondary opacity-25 mb-3"></i>
                    <p class="text-muted fw-medium">You have no draft posts.</p>
                </div>

                <div th:unless="${drafts == null or drafts.isEmpty()}">
                    <div th:each="draft : ${drafts}" class="draft-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <a th:href="@{/questions/ask(draftId=${draft.questionId})}" class="draft-title"
                                    th:text="${draft.title}">Draft Title</a>
                                <p class="draft-body-excerpt" th:text="${draft.body}">Body excerpt...</p>

                                <div class="draft-meta">
                                    Last updated on <span
                                        th:text="${#dates.format(draft.updatedAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                                </div>
                            </div>

                            <div class="d-flex ms-3">
                                <a th:href="@{/questions/ask(draftId=${draft.questionId})}"
                                    class="btn btn-sm btn-outline-primary me-2">
                                    <i class="fa-solid fa-pen"></i> Continue
                                </a>
                                <form th:action="@{/questions/delete}" method="post"
                                    onsubmit="return confirm('Delete this draft permanently?');" style="margin:0;">
                                    <input type="hidden" name="questionId" th:value="${draft.questionId}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fa-solid fa-trash"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{Common/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
