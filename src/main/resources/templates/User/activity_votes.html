<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title th:text="${uPro.username + ' - Votes - DevQuery'}">Votes - DevQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #fff;
            padding-top: 60px;
            color: #232629;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Adjusted", "Segoe UI", "Liberation Sans", sans-serif;
        }

        .user-name {
            font-size: 34px;
            font-weight: normal;
            margin-bottom: 4px;
        }

        .user-meta {
            list-style: none;
            padding: 0;
            margin: 0;
            color: #6a737c;
            font-size: 13px;
        }

        .profile-tabs {
            border-bottom: none;
            margin-bottom: 20px;
        }

        .profile-tabs .nav-link {
            color: #525960;
            border-radius: 100px;
            padding: 6px 12px;
            margin-right: 5px;
            border: none;
            font-size: 13px;
        }

        .profile-tabs .nav-link:hover {
            background-color: #e3e6e8;
            color: #0c0d0e;
        }

        .profile-tabs .nav-link.active {
            background-color: #f48024;
            color: white;
            font-weight: 500;
        }

        .activity-nav .list-group-item {
            border: none;
            padding: 6px 12px;
            margin-bottom: 2px;
            border-radius: 100px;
            color: #525960;
            font-size: 13px;
            background-color: transparent;
        }

        .activity-nav .list-group-item:hover {
            background-color: #f8f9f9;
            color: #0c0d0e;
        }

        .activity-nav .list-group-item.active {
            background-color: #e3e6e8;
            color: #0c0d0e;
            font-weight: bold;
        }

        .so-list-container {
            border: 1px solid #d6d9dc;
            border-radius: 5px;
        }

        .so-list-item {
            border-bottom: 1px solid #e3e6e8;
            padding: 16px;
            transition: background-color 0.1s;
        }

        .so-list-item:last-child {
            border-bottom: none;
        }

        .so-list-item:hover {
            background-color: #f8f9f9;
        }

        .so-link {
            color: #0074cc;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .so-link:hover {
            color: #0a95ff;
        }

        .btn-primary {
            background-color: #f48024;
            border-color: #f48024;
        }

        .btn-primary:hover {
            background-color: #da680b;
            border-color: #da680b;
        }

        .btn-outline-secondary {
            border-color: #d6d9dc;
            color: #525960;
        }

        .btn-outline-secondary:hover {
            background-color: #e3e6e8;
            color: #0c0d0e;
            border-color: #d6d9dc;
        }

        /* Bố cục Sidebar dính chuẩn SO */
        .main-container {
            max-width: 1264px;
            margin: 0 auto;
            display: flex;
            align-items: stretch;
            background-color: #fff;
        }

        .left-sidebar {
            width: 164px;
            flex-shrink: 0;
            border-right: 1px solid #d6d9dc;
        }

        .main-content {
            flex-grow: 1;
            padding: 24px;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 50px;
        }
    </style>
</head>

<body style="padding-top: 60px; background-color: #fff;">
    <div th:replace="~{Common/header :: header}"></div>
    <div class="main-container">
        <div class="left-sidebar d-none d-md-block">
            <div th:replace="~{Common/sidebar :: sidebar('profile')}"></div>
        </div>
        <main class="main-content">
            <div th:replace="~{Common/profileTemplate :: profileTemplate('activity')}"></div>
            <div class="row mt-4">
                <div class="col-md-2">
                    <div class="list-group list-group-flush activity-nav">
                        <a th:href="@{/activity(id=${uPro.userId}, tab='summary')}"
                            class="list-group-item list-group-item-action">Summary</a>
                        <a th:href="@{/activity(id=${uPro.userId}, tab='questions')}"
                            class="list-group-item list-group-item-action">Questions</a>
                        <a th:href="@{/activity(id=${uPro.userId}, tab='answers')}"
                            class="list-group-item list-group-item-action">Answers</a>
                        <a th:href="@{/activity(id=${uPro.userId}, tab='comments')}"
                            class="list-group-item list-group-item-action">Comments</a>
                        <a th:href="@{/activity(id=${uPro.userId}, tab='tags')}"
                            class="list-group-item list-group-item-action">Tags</a>
                        <a th:href="@{/activity(id=${uPro.userId}, tab='follows')}"
                            class="list-group-item list-group-item-action">Follows</a>
                        <th:block sec:authorize="isAuthenticated()">
                            <a th:if="${loggedInUser != null && loggedInUser.userId == uPro.userId}"
                                th:href="@{/activity(id=${uPro.userId}, tab='votes')}"
                                class="list-group-item list-group-item-action active">Votes</a>
                        </th:block>
                    </div>
                </div>
                <div class="col-md-10 ps-md-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 style="font-weight: 400; font-size: 21px;"
                            th:text="${'Vote History (' + totalRecords + ')'}">Vote History (0)</h4>
                    </div>
                    <div class="so-list-container">
                        <th:block th:if="${itemsList != null and !itemsList.isEmpty()}">
                            <div th:each="v : ${itemsList}" class="so-list-item d-flex align-items-center">
                                <th:block th:if="${v.voteType == 'up'}">
                                    <div class="text-success text-center me-3" style="width: 40px; font-size: 20px;"><i
                                            class="fa-solid fa-circle-arrow-up"></i></div>
                                </th:block>
                                <th:block th:unless="${v.voteType == 'up'}">
                                    <div class="text-danger text-center me-3" style="width: 40px; font-size: 20px;"><i
                                            class="fa-solid fa-circle-arrow-down"></i></div>
                                </th:block>
                                <div class="flex-grow-1">
                                    <span class="badge bg-secondary me-2" style="font-size: 10px; font-weight: normal;"
                                        th:text="${v.postType}">Type</span>
                                    <a th:href="@{/question(id=${v.questionId})}" class="so-link"
                                        th:text="${v.title}">Title</a>
                                </div>
                                <div class="text-muted" style="font-size: 12px; min-width: 100px; text-align: right;"
                                    th:text="${#dates.format(v.createdAt, 'MMM dd, yyyy')}">Date</div>
                            </div>
                        </th:block>
                        <th:block th:if="${itemsList == null or itemsList.isEmpty()}">
                            <div class="text-center text-muted p-5">No voting history found.</div>
                        </th:block>
                    </div>
                    <th:block th:if="${totalPage != null and totalPage > 1}">
                        <div class="mt-4">
                            <a th:each="i : ${#numbers.sequence(1, totalPage)}"
                                th:href="@{/activity(id=${uPro.userId}, tab='votes', page=${i})}"
                                th:classappend="${currentPage == i ? 'btn-primary' : 'btn-outline-secondary'}"
                                class="btn btn-sm me-1" th:text="${i}">1</a>
                        </div>
                    </th:block>
                </div>
            </div>
        </main>
    </div>
    <div th:replace="~{Common/footer :: footer}"></div>
</body>

</html>
