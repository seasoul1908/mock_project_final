<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <script>
        if (localStorage.getItem('devquery-theme') === 'dark') {
            document.write('<style>body { background-color: #2d3135 !important; }</style>');
        }
    </script>
</head>

<body>

    <div th:fragment="profileTemplate(activeTab)">
        <div class="d-flex justify-content-between mb-5">

            <div class="d-flex">
                <div class="me-4">
                    <img th:src="${not #strings.isEmpty(uPro.avatarUrl) ? uPro.avatarUrl : '/assets/img/Avatar.png'}"
                        alt="Avatar" class="rounded-circle shadow-sm"
                        style="width: 144px; height: 144px; object-fit: cover;">
                </div>

                <div class="pt-1">
                    <h1 class="user-name mb-2" th:text="${uPro.username}">Username</h1>

                    <div class="user-meta mb-3">
                        <i class="fa-solid fa-cake-candles me-1"></i> Member since <span
                            th:text="${#dates.format(uPro.createdAt, 'MMM dd, yyyy')}">Date</span>

                        <span class="mx-2">|</span>
                        <i class="fa-solid fa-star text-warning me-1"></i> <span th:text="${uPro.reputation}">0</span>
                        reputation

                        <th:block th:if="${not #strings.isEmpty(uPro.location)}">
                            <span class="mx-2">|</span>
                            <i class="fa-solid fa-location-dot me-1"></i> <span
                                th:text="${uPro.location}">Location</span>
                        </th:block>
                    </div>

                    <ul class="nav profile-tabs">
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activeTab == 'profile' ? 'active' : ''}"
                                th:href="@{/profile(id=${uPro.userId})}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activeTab == 'activity' ? 'active' : ''}"
                                th:href="@{/activity(id=${uPro.userId}, tab='summary')}">Activity</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activeTab == 'badge' ? 'active' : ''}"
                                th:href="@{/badge(id=${uPro.userId})}">Badge</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activeTab == 'saves' ? 'active' : ''}"
                                th:href="@{/saves(id=${uPro.userId})}">Saves</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activeTab == 'preferences' ? 'active' : ''}"
                                th:href="@{/settings/preferences}">Preferences</a>
                        </li>
                        <li class="nav-item" th:if="${loggedInUser != null && loggedInUser.userId == uPro.userId}">
                            <a class="nav-link" th:classappend="${activeTab == 'drafts' ? 'active' : ''}"
                                th:href="@{/questions/drafts}">Drafts</a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="pt-2">
                <th:block sec:authorize="isAuthenticated()">
                    <a th:if="${loggedInUser != null && loggedInUser.userId == uPro.userId}" th:href="@{/edit-profile}"
                        class="btn btn-outline-secondary btn-sm text-secondary">
                        <i class="fas fa-pencil-alt me-1"></i> Edit profile
                    </a>
                </th:block>
            </div>

        </div>
    </div>

</body>

</html>
