<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tag Management | DevQuery Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #f6f7f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; }
        .admin-sidebar { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #dee2e6; padding-top: 16px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
        .admin-nav-link { display: block; padding: 9px 16px; color: #525960; text-decoration: none; font-size: 14px; border-radius: 6px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
        .admin-nav-link:hover { color: #0c0d0e; background: #f1f2f3; }
        .admin-nav-link.active { color: #0c0d0e; background: #e3e6e8; border-left: 3px solid #f48024; font-weight: 600; padding-left: 13px; }
        .sidebar-label { padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6a737c; letter-spacing: 0.5px; }
        .content-card { background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e3e6e8; }
        .page-title { font-size: 22px; font-weight: 600; color: #0c0d0e; margin-bottom: 20px; }
        .tag-chip { display: inline-block; background: #e1ecf4; color: #39739d; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
<div th:replace="~{Common/header :: header}"></div>

<div style="margin-top:56px; display:flex; min-height:calc(100vh - 56px);">
    <!-- Admin Sidebar -->
    <nav class="admin-sidebar">
        <div class="sidebar-label">Management</div>
        <a th:href="@{/admin/dashboard}" class="admin-nav-link"><i class="fa-solid fa-chart-line fa-fw me-2"></i> Dashboard</a>
        <a th:href="@{/admin/users}" class="admin-nav-link"><i class="fa-solid fa-users fa-fw me-2"></i> Users</a>
        <a th:href="@{/admin/tags}" class="admin-nav-link active"><i class="fa-solid fa-tags fa-fw me-2"></i> Tags</a>
        <a th:href="@{/admin/reports}" class="admin-nav-link"><i class="fa-solid fa-flag fa-fw me-2"></i> Reports</a>
        <a th:href="@{/admin/rules}" class="admin-nav-link"><i class="fa-solid fa-gavel fa-fw me-2"></i> Rules</a>
        <a th:href="@{/admin/badges}" class="admin-nav-link"><i class="fa-solid fa-medal fa-fw me-2"></i> Badges</a>
        <a th:href="@{/admin/blogs}" class="admin-nav-link"><i class="fa-solid fa-newspaper fa-fw me-2"></i> Blogs</a>
    </nav>

    <!-- Main Content -->
    <main style="flex:1; padding:24px; overflow:auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="page-title mb-0"><i class="fa-solid fa-tags me-2" style="color:#f48024;"></i> Tag Management</div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#tagModal" onclick="openAddModal()">
                <i class="fa-solid fa-plus me-1"></i> Add Tag
            </button>
        </div>

        <div class="content-card">
            <table class="table table-hover table-sm mb-0" style="font-size:13px;" id="tagsTable">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Tag Name</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tags}" th:id="'tr-' + ${t.id}">
                        <td class="text-muted" th:text="${t.id}"></td>
                        <td><span class="tag-chip" th:text="${t.tagName}"></span></td>
                        <td class="text-muted" style="max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                            th:text="${t.description}"></td>
                        <td>
                            <span class="badge" th:id="'status-' + ${t.id}"
                                th:classappend="${t.isActive} ? 'bg-success' : 'bg-secondary'"
                                th:text="${t.isActive ? 'Active' : 'Inactive'}"></span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1 edit-btn"
                                th:data-id="${t.id}" th:data-name="${t.tagName}" th:data-desc="${t.description}">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn btn-sm me-1 toggle-btn"
                                th:classappend="${t.isActive} ? 'btn-outline-secondary' : 'btn-outline-success'"
                                th:data-id="${t.id}"
                                th:title="${t.isActive} ? 'Deactivate' : 'Activate'">
                                <i class="fa-solid" th:classappend="${t.isActive} ? 'fa-eye-slash' : 'fa-eye'"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger delete-btn" th:data-id="${t.id}" th:data-name="${t.tagName}">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tags)}" id="empty-row">
                        <td colspan="5" class="text-center text-muted py-4">No tags found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Tag Modal -->
<div class="modal fade" id="tagModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tagModalTitle">Add Tag</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tagId"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tag Name <span class="text-danger">*</span></label>
                    <input type="text" id="tagName" class="form-control" placeholder="e.g. javascript"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea id="tagDesc" class="form-control" rows="3" placeholder="Short description of this tag..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveTagBtn">Save Tag</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h6 class="modal-title">Delete Tag</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Delete tag <strong id="deleteTagName"></strong>? This cannot be undone.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg">Done.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const tagModalEl = document.getElementById('tagModal');
    const tagModal = new bootstrap.Modal(tagModalEl);
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    const toast = new bootstrap.Toast(document.getElementById('toast'), { delay: 2500 });
    let deleteTargetId = null;

    function showToast(msg, success) {
        const el = document.getElementById('toast');
        el.classList.remove('bg-success', 'bg-danger');
        el.classList.add(success ? 'bg-success' : 'bg-danger');
        document.getElementById('toast-msg').textContent = msg;
        toast.show();
    }

    function openAddModal() {
        document.getElementById('tagModalTitle').textContent = 'Add Tag';
        document.getElementById('tagId').value = '';
        document.getElementById('tagName').value = '';
        document.getElementById('tagDesc').value = '';
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('tagModalTitle').textContent = 'Edit Tag';
            document.getElementById('tagId').value = btn.dataset.id;
            document.getElementById('tagName').value = btn.dataset.name;
            document.getElementById('tagDesc').value = btn.dataset.desc || '';
            tagModal.show();
        });
    });

    document.getElementById('saveTagBtn').addEventListener('click', () => {
        const id = document.getElementById('tagId').value;
        const name = document.getElementById('tagName').value.trim();
        const desc = document.getElementById('tagDesc').value.trim();
        if (!name) { showToast('Tag name is required', false); return; }

        const url = id ? `/api/admin/tags/${id}` : '/api/admin/tags';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tagName: name, description: desc })
        }).then(r => {
            if (r.ok) { showToast(id ? 'Tag updated!' : 'Tag created!', true); setTimeout(() => location.reload(), 800); }
            else { showToast('Save failed', false); }
        }).catch(() => showToast('Error saving tag', false));

        tagModal.hide();
    });

    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            fetch(`/api/admin/tags/${id}/toggle`, { method: 'PUT' })
                .then(r => r.json()).then(data => {
                    const isActive = data.isActive;
                    const statusEl = document.getElementById('status-' + id);
                    statusEl.className = 'badge ' + (isActive ? 'bg-success' : 'bg-secondary');
                    statusEl.textContent = isActive ? 'Active' : 'Inactive';
                    btn.className = 'btn btn-sm me-1 ' + (isActive ? 'btn-outline-secondary' : 'btn-outline-success');
                    btn.innerHTML = `<i class="fa-solid ${isActive ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
                    showToast('Status updated', true);
                }).catch(() => showToast('Error toggling status', false));
        });
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            deleteTargetId = btn.dataset.id;
            document.getElementById('deleteTagName').textContent = btn.dataset.name;
            deleteModal.show();
        });
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        fetch(`/api/admin/tags/${deleteTargetId}`, { method: 'DELETE' })
            .then(r => {
                if (r.ok) {
                    document.getElementById('tr-' + deleteTargetId)?.remove();
                    showToast('Tag deleted', true);
                } else { showToast('Delete failed', false); }
            }).catch(() => showToast('Error deleting tag', false));
        deleteModal.hide();
    });
</script>
</body>
</html>
