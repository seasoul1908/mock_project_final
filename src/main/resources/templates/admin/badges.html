<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Badge Management | DevQuery Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #f6f7f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; }
        .admin-sidebar { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #dee2e6; padding-top: 16px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
        .admin-nav-link { display: block; padding: 9px 16px; color: #525960; text-decoration: none; font-size: 14px; border-radius: 6px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
        .admin-nav-link:hover { color: #0c0d0e; background: #f1f2f3; }
        .admin-nav-link.active { color: #0c0d0e; background: #e3e6e8; border-left: 3px solid #f48024; font-weight: 600; padding-left: 13px; }
        .sidebar-label { padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6a737c; letter-spacing: 0.5px; }
        .content-card { background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e3e6e8; }
        .page-title { font-size: 22px; font-weight: 600; color: #0c0d0e; margin-bottom: 20px; }
        .badge-gold { color: #FFD700; }
        .badge-silver { color: #C0C0C0; }
        .badge-bronze { color: #CD7F32; }
        .badge-icon { font-size: 20px; }
    </style>
</head>
<body>
<div th:replace="~{Common/header :: header}"></div>

<div style="margin-top:56px; display:flex; min-height:calc(100vh - 56px);">
    <!-- Admin Sidebar -->
    <nav class="admin-sidebar">
        <div class="sidebar-label">Management</div>
        <a th:href="@{/admin/dashboard}" class="admin-nav-link"><i class="fa-solid fa-chart-line fa-fw me-2"></i> Dashboard</a>
        <a th:href="@{/admin/users}" class="admin-nav-link"><i class="fa-solid fa-users fa-fw me-2"></i> Users</a>
        <a th:href="@{/admin/tags}" class="admin-nav-link"><i class="fa-solid fa-tags fa-fw me-2"></i> Tags</a>
        <a th:href="@{/admin/reports}" class="admin-nav-link"><i class="fa-solid fa-flag fa-fw me-2"></i> Reports</a>
        <a th:href="@{/admin/rules}" class="admin-nav-link"><i class="fa-solid fa-gavel fa-fw me-2"></i> Rules</a>
        <a th:href="@{/admin/badges}" class="admin-nav-link active"><i class="fa-solid fa-medal fa-fw me-2"></i> Badges</a>
        <a th:href="@{/admin/blogs}" class="admin-nav-link"><i class="fa-solid fa-newspaper fa-fw me-2"></i> Blogs</a>

    </nav>

    <!-- Main Content -->
    <main style="flex:1; padding:24px; overflow:auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="page-title mb-0"><i class="fa-solid fa-medal me-2" style="color:#f48024;"></i> Badge Management</div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#badgeModal" onclick="openAddModal()">
                <i class="fa-solid fa-plus me-1"></i> Add Badge
            </button>
        </div>

        <div class="content-card">
            <table class="table table-hover table-sm mb-0" style="font-size:13px;">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Badge</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Required Rep.</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${badges}" th:id="'row-' + ${b.badgeId}">
                        <td class="text-muted" th:text="${b.badgeId}"></td>
                        <td>
                            <i class="fa-solid fa-medal badge-icon"
                               th:classappend="${b.type == 'gold'} ? 'badge-gold' : (${b.type == 'silver'} ? 'badge-silver' : 'badge-bronze')"></i>
                            <span class="fw-semibold ms-1" th:text="${b.name}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                th:classappend="${b.type == 'gold'} ? 'bg-warning text-dark' : (${b.type == 'silver'} ? 'bg-secondary' : 'text-white')"
                                th:style="${b.type == 'bronze'} ? 'background-color:#CD7F32;' : ''"
                                th:text="${b.type}"></span>
                        </td>
                        <td class="text-muted" style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                            th:text="${b.description}" th:title="${b.description}"></td>
                        <td th:text="${b.requiredReputation != null ? b.requiredReputation : 0}"></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1 edit-btn"
                                th:data-id="${b.badgeId}"
                                th:data-name="${b.name}"
                                th:data-type="${b.type}"
                                th:data-desc="${b.description}"
                                th:data-rep="${b.requiredReputation != null ? b.requiredReputation : 0}">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger delete-btn"
                                th:data-id="${b.badgeId}" th:data-name="${b.name}">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(badges)}">
                        <td colspan="6" class="text-center text-muted py-4">No badges found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Badge Modal -->
<div class="modal fade" id="badgeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="badgeModalTitle">Add Badge</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="badgeId"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Badge Name <span class="text-danger">*</span></label>
                    <input type="text" id="badgeName" class="form-control" placeholder="e.g. First Answer"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
                    <select id="badgeType" class="form-select">
                        <option value="bronze">Bronze</option>
                        <option value="silver">Silver</option>
                        <option value="gold">Gold</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea id="badgeDesc" class="form-control" rows="3" placeholder="What earns this badge..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Required Reputation</label>
                    <input type="number" id="badgeRep" class="form-control" placeholder="0" min="0"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveBadgeBtn">Save Badge</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h6 class="modal-title">Delete Badge</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Delete badge <strong id="deleteBadgeName"></strong>?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg">Done.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const badgeModal = new bootstrap.Modal(document.getElementById('badgeModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    const toast = new bootstrap.Toast(document.getElementById('toast'), { delay: 2500 });
    let deleteTargetId = null;

    function showToast(msg, success) {
        const el = document.getElementById('toast');
        el.classList.remove('bg-success', 'bg-danger');
        el.classList.add(success ? 'bg-success' : 'bg-danger');
        document.getElementById('toast-msg').textContent = msg;
        toast.show();
    }

    function openAddModal() {
        document.getElementById('badgeModalTitle').textContent = 'Add Badge';
        document.getElementById('badgeId').value = '';
        document.getElementById('badgeName').value = '';
        document.getElementById('badgeType').value = 'bronze';
        document.getElementById('badgeDesc').value = '';
        document.getElementById('badgeRep').value = '0';
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('badgeModalTitle').textContent = 'Edit Badge';
            document.getElementById('badgeId').value = btn.dataset.id;
            document.getElementById('badgeName').value = btn.dataset.name;
            document.getElementById('badgeType').value = btn.dataset.type;
            document.getElementById('badgeDesc').value = btn.dataset.desc || '';
            document.getElementById('badgeRep').value = btn.dataset.rep || '0';
            badgeModal.show();
        });
    });

    document.getElementById('saveBadgeBtn').addEventListener('click', () => {
        const id = document.getElementById('badgeId').value;
        const name = document.getElementById('badgeName').value.trim();
        const type = document.getElementById('badgeType').value;
        const description = document.getElementById('badgeDesc').value.trim();
        const requiredReputation = parseInt(document.getElementById('badgeRep').value) || 0;
        if (!name || !type) { showToast('Name and type are required', false); return; }

        const url = id ? `/api/admin/badges/${id}` : '/api/admin/badges';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, type, description, requiredReputation })
        }).then(r => {
            if (r.ok) { showToast(id ? 'Badge updated!' : 'Badge created!', true); setTimeout(() => location.reload(), 800); }
            else showToast('Save failed', false);
        }).catch(() => showToast('Error saving badge', false));

        badgeModal.hide();
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            deleteTargetId = btn.dataset.id;
            document.getElementById('deleteBadgeName').textContent = btn.dataset.name;
            deleteModal.show();
        });
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        fetch(`/api/admin/badges/${deleteTargetId}`, { method: 'DELETE' })
            .then(r => {
                if (r.ok) { document.getElementById('row-' + deleteTargetId)?.remove(); showToast('Badge deleted', true); }
                else showToast('Delete failed', false);
            }).catch(() => showToast('Error deleting', false));
        deleteModal.hide();
    });
</script>
</body>
</html>
