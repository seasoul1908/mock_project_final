<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Feedbacks | DevQuery Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #f6f7f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; }
        .admin-sidebar { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #dee2e6; padding-top: 16px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
        .admin-nav-link { display: block; padding: 9px 16px; color: #525960; text-decoration: none; font-size: 14px; border-radius: 6px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
        .admin-nav-link:hover { color: #0c0d0e; background: #f1f2f3; }
        .admin-nav-link.active { color: #0c0d0e; background: #e3e6e8; border-left: 3px solid #f48024; font-weight: 600; padding-left: 13px; }
        .sidebar-label { padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6a737c; letter-spacing: 0.5px; }
        .content-card { background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e3e6e8; }
        .page-title { font-size: 22px; font-weight: 600; color: #0c0d0e; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 16px; border: 1px solid #e3e6e8; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #0c0d0e; line-height: 1; }
        .stat-label { color: #6a737c; font-size: 12px; margin-top: 4px; }
        .message-preview { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }
        .feedback-row { cursor: pointer; }
        .feedback-row:hover td { background: #f1f2f3 !important; }
        .modal-body { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>
<div th:replace="~{Common/header :: header}"></div>

<div style="margin-top:56px; display:flex; min-height:calc(100vh - 56px);">
    <!-- Admin Sidebar -->
    <nav class="admin-sidebar">
        <div class="sidebar-label">Management</div>
        <a th:href="@{/admin/dashboard}" class="admin-nav-link"><i class="fa-solid fa-chart-line fa-fw me-2"></i> Dashboard</a>
        <a th:href="@{/admin/users}" class="admin-nav-link"><i class="fa-solid fa-users fa-fw me-2"></i> Users</a>
        <a th:href="@{/admin/tags}" class="admin-nav-link"><i class="fa-solid fa-tags fa-fw me-2"></i> Tags</a>
        <a th:href="@{/admin/reports}" class="admin-nav-link"><i class="fa-solid fa-flag fa-fw me-2"></i> Reports</a>
        <a th:href="@{/admin/rules}" class="admin-nav-link"><i class="fa-solid fa-gavel fa-fw me-2"></i> Rules</a>
        <a th:href="@{/admin/badges}" class="admin-nav-link"><i class="fa-solid fa-medal fa-fw me-2"></i> Badges</a>
        <a th:href="@{/admin/blogs}" class="admin-nav-link"><i class="fa-solid fa-newspaper fa-fw me-2"></i> Blogs</a>
        <a th:href="@{/admin/feedbacks}" class="admin-nav-link active">
            <i class="fa-solid fa-comments fa-fw me-2"></i> Feedbacks
            <span th:if="${totalFeedbacks > 0}" class="badge bg-secondary ms-1 rounded-pill" th:text="${totalFeedbacks}"></span>
        </a>
    </nav>

    <!-- Main Content -->
    <main style="flex:1; padding:24px; overflow:auto;">
        <div class="page-title"><i class="fa-solid fa-comments me-2 text-warning"></i> Manage Feedbacks</div>

        <!-- Stats -->
        <div class="d-flex gap-3 mb-4">
            <div class="stat-card" style="min-width:160px;">
                <div class="stat-value text-primary" th:text="${totalFeedbacks}">0</div>
                <div class="stat-label"><i class="fa-solid fa-envelope-open-text me-1"></i> Total Feedbacks</div>
            </div>
        </div>

        <!-- Table -->
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted small">
                    Showing page <strong th:text="${currentPage}"></strong> / <strong th:text="${totalPages}"></strong>
                    &mdash; <strong th:text="${totalFeedbacks}"></strong> total feedbacks
                </span>
            </div>

            <table class="table table-hover table-sm mb-0" style="font-size:13px; table-layout:fixed; width:100%;">
                <colgroup>
                    <col style="width:16.66%;"/>
                    <col style="width:16.66%;"/>
                    <col style="width:16.66%;"/>
                    <col style="width:16.66%;"/>
                    <col style="width:16.66%;"/>
                    <col style="width:16.70%;"/>
                </colgroup>
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>User</th>
                        <th>Title</th>
                        <th>Sent At</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="feedback-row"
                        th:each="fb : ${feedbacks}"
                        th:data-msg="${fb.message}"
                        th:data-title="${fb.title}"
                        th:data-name="${fb.name}"
                        th:data-email="${fb.email}"
                        th:data-user="${fb.user != null ? fb.user.username : '—'}"
                        th:data-time="${fb.createdAt != null ? #temporals.format(fb.createdAt.toLocalDateTime(), 'dd/MM/yyyy HH:mm') : '—'}"
                        onclick="showMessage(this)">
                        <td class="text-muted" th:text="${fb.feedbackId}"></td>
                        <td th:text="${fb.name}"></td>
                        <td th:text="${fb.email}"></td>
                        <td>
                            <span th:if="${fb.user != null}">
                                <span class="badge bg-light text-dark border" th:text="${fb.user.username}"></span>
                            </span>
                            <span th:if="${fb.user == null}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span class="message-preview text-muted"
                                  th:text="${#strings.abbreviate(fb.title, 60)}">
                            </span>
                        </td>
                        <td class="text-muted"
                            th:text="${fb.createdAt != null ? #temporals.format(fb.createdAt.toLocalDateTime(), 'dd/MM/yyyy HH:mm') : '—'}">
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(feedbacks)}">
                        <td colspan="6" class="text-center text-muted py-4">No feedbacks found</td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-3 d-flex justify-content-center">
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/feedbacks(page=${currentPage - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${p == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/admin/feedbacks(page=${p})}" th:text="${p}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/feedbacks(page=${currentPage + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>
</div>

<!-- Message Detail Modal -->
<div class="modal fade" id="msgModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content" style="border-radius:10px; overflow:hidden; border:1px solid #d6d9dc;">

            <!-- Email toolbar -->
            <div style="background:#f3f4f5; border-bottom:1px solid #d6d9dc; padding:10px 16px; display:flex; align-items:center; justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <i class="fa-solid fa-inbox text-muted" style="font-size:13px;"></i>
                    <span style="font-size:12px; color:#6a737c; font-weight:600; text-transform:uppercase; letter-spacing:.5px;">Inbox &rsaquo; Feedback</span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" style="font-size:11px;"></button>
            </div>

            <!-- Sender info -->
            <div style="padding:14px 24px; display:flex; align-items:center; gap:14px;">
                <!-- Avatar circle -->
                <div id="modalAvatar" style="width:40px; height:40px; border-radius:50%; background:#f48024; color:#fff; font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;"></div>
                <!-- Meta -->
                <div style="flex:1; min-width:0;">
                    <div style="display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;">
                        <span id="modalName" style="font-weight:600; font-size:14px; color:#0c0d0e;"></span>
                        <span style="color:#6a737c; font-size:12px;">&lt;<span id="modalEmail"></span>&gt;</span>
                    </div>
                    <div style="font-size:12px; color:#6a737c; margin-top:2px;">
                        <span>To: <strong>DevQuery Admin</strong></span>
                        <span class="mx-2">&bull;</span>
                        <span>Account: </span><span id="modalUser" style="font-weight:500;"></span>
                    </div>
                </div>
                <!-- Date -->
                <div id="modalTime" style="font-size:12px; color:#6a737c; white-space:nowrap; flex-shrink:0;"></div>
            </div>

            <!-- Divider -->
            <hr style="margin:0; border-color:#e8eaed;"/>

            <!-- Subject line -->
            <div style="padding:14px 24px;">
                <div id="modalTitle" style="font-size:18px; font-weight:700; color:#0c0d0e; line-height:1.3;"></div>
            </div>

            <!-- Divider -->
            <hr style="margin:0; border-color:#e8eaed;"/>

            <!-- Email body -->
            <div style="padding:24px; background:#fff; min-height:140px;">
                <div id="modalMsg" style="font-size:14px; line-height:1.8; color:#232629; white-space:pre-wrap; word-break:break-word;"></div>
            </div>

            <!-- Footer -->
            <div style="background:#f3f4f5; border-top:1px solid #d6d9dc; padding:10px 24px; display:flex; justify-content:flex-end;">
                <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i> Close
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const msgModal = new bootstrap.Modal(document.getElementById('msgModal'));

    function showMessage(btn) {
        const name = btn.dataset.name || '?';
        document.getElementById('modalAvatar').textContent = name.charAt(0).toUpperCase();
        document.getElementById('modalName').textContent = name;
        document.getElementById('modalEmail').textContent = btn.dataset.email;
        document.getElementById('modalUser').textContent = btn.dataset.user;
        document.getElementById('modalTime').textContent = btn.dataset.time;
        document.getElementById('modalTitle').textContent = btn.dataset.title;
        document.getElementById('modalMsg').textContent = btn.dataset.msg;
        msgModal.show();
    }
</script>
</body>
</html>
