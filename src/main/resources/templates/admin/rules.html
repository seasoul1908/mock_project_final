<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rule Management | DevQuery Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: #f6f7f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; }
        .admin-sidebar { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #dee2e6; padding-top: 16px; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
        .admin-nav-link { display: block; padding: 9px 16px; color: #525960; text-decoration: none; font-size: 14px; border-radius: 6px; margin: 2px 8px; transition: background 0.15s, color 0.15s; }
        .admin-nav-link:hover { color: #0c0d0e; background: #f1f2f3; }
        .admin-nav-link.active { color: #0c0d0e; background: #e3e6e8; border-left: 3px solid #f48024; font-weight: 600; padding-left: 13px; }
        .sidebar-label { padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6a737c; letter-spacing: 0.5px; }
        .content-card { background: #fff; border-radius: 8px; padding: 20px; border: 1px solid #e3e6e8; }
        .page-title { font-size: 22px; font-weight: 600; color: #0c0d0e; margin-bottom: 20px; }
        .rule-card { border: 1px solid #e3e6e8; border-radius: 6px; padding: 16px; margin-bottom: 12px; background: #fff; }
        .rule-card:hover { border-color: #f48024; }
        .rule-number { width: 28px; height: 28px; background: #f48024; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    </style>
</head>
<body>
<div th:replace="~{Common/header :: header}"></div>

<div style="margin-top:56px; display:flex; min-height:calc(100vh - 56px);">
    <!-- Admin Sidebar -->
    <nav class="admin-sidebar">
        <div class="sidebar-label">Management</div>
        <a th:href="@{/admin/dashboard}" class="admin-nav-link"><i class="fa-solid fa-chart-line fa-fw me-2"></i> Dashboard</a>
        <a th:href="@{/admin/users}" class="admin-nav-link"><i class="fa-solid fa-users fa-fw me-2"></i> Users</a>
        <a th:href="@{/admin/tags}" class="admin-nav-link"><i class="fa-solid fa-tags fa-fw me-2"></i> Tags</a>
        <a th:href="@{/admin/reports}" class="admin-nav-link"><i class="fa-solid fa-flag fa-fw me-2"></i> Reports</a>
        <a th:href="@{/admin/rules}" class="admin-nav-link active"><i class="fa-solid fa-gavel fa-fw me-2"></i> Rules</a>
        <a th:href="@{/admin/badges}" class="admin-nav-link"><i class="fa-solid fa-medal fa-fw me-2"></i> Badges</a>
        <a th:href="@{/admin/blogs}" class="admin-nav-link"><i class="fa-solid fa-newspaper fa-fw me-2"></i> Blogs</a>
        <a th:href="@{/admin/feedbacks}" class="admin-nav-link"><i class="fa-solid fa-comments fa-fw me-2"></i> Feedbacks</a>
    </nav>

    <!-- Main Content -->
    <main style="flex:1; padding:24px; overflow:auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="page-title mb-0"><i class="fa-solid fa-gavel me-2 text-warning" ></i> Rule Management</div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#ruleModal" onclick="openAddModal()">
                <i class="fa-solid fa-plus me-1"></i> Add Rule
            </button>
        </div>

        <!-- Rules List -->
        <div id="rulesList">
            <div th:each="r, stat : ${rules}" class="rule-card" th:id="'rule-' + ${r.ruleId}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex align-items-start gap-3 flex-grow-1">
                        <span class="rule-number" th:text="${stat.index + 1}"></span>
                        <div class="flex-grow-1">
                            <div class="fw-semibold mb-1" th:text="${r.title}"></div>
                            <div class="text-muted" style="font-size:13px; line-height:1.5;" th:text="${r.content}"></div>
                            <div class="text-muted mt-1" style="font-size:11px;">
                                Created: <span th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd/MM/yyyy') : '—'}"></span>
                                <span th:if="${r.updatedAt != null}">
                                    · Updated: <span th:text="${#temporals.format(r.updatedAt, 'dd/MM/yyyy')}"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="ms-3 d-flex gap-1">
                        <button class="btn btn-sm btn-outline-primary edit-btn"
                            th:data-id="${r.ruleId}" th:data-title="${r.title}" th:data-content="${r.content}">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger delete-btn" th:data-id="${r.ruleId}" th:data-title="${r.title}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(rules)}" class="content-card text-center text-muted py-5">
                <i class="fa-solid fa-gavel fa-2x mb-3 opacity-25"></i><br/>
                No rules defined yet. Click <strong>Add Rule</strong> to create the first one.
            </div>
        </div>
    </main>
</div>

<!-- Rule Modal -->
<div class="modal fade" id="ruleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ruleModalTitle">Add Rule</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="ruleId"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                    <input type="text" id="ruleTitle" class="form-control" placeholder="Rule title..."/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Content <span class="text-danger">*</span></label>
                    <textarea id="ruleContent" class="form-control" rows="5" placeholder="Describe the rule in detail..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveRuleBtn">Save Rule</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h6 class="modal-title">Delete Rule</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Delete rule <strong id="deleteRuleTitle"></strong>?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg">Done.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ruleModal = new bootstrap.Modal(document.getElementById('ruleModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    const toast = new bootstrap.Toast(document.getElementById('toast'), { delay: 2500 });
    let deleteTargetId = null;

    function showToast(msg, success) {
        const el = document.getElementById('toast');
        el.classList.remove('bg-success', 'bg-danger');
        el.classList.add(success ? 'bg-success' : 'bg-danger');
        document.getElementById('toast-msg').textContent = msg;
        toast.show();
    }

    function openAddModal() {
        document.getElementById('ruleModalTitle').textContent = 'Add Rule';
        document.getElementById('ruleId').value = '';
        document.getElementById('ruleTitle').value = '';
        document.getElementById('ruleContent').value = '';
    }

    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.getElementById('ruleModalTitle').textContent = 'Edit Rule';
            document.getElementById('ruleId').value = btn.dataset.id;
            document.getElementById('ruleTitle').value = btn.dataset.title;
            document.getElementById('ruleContent').value = btn.dataset.content;
            ruleModal.show();
        });
    });

    document.getElementById('saveRuleBtn').addEventListener('click', () => {
        const id = document.getElementById('ruleId').value;
        const title = document.getElementById('ruleTitle').value.trim();
        const content = document.getElementById('ruleContent').value.trim();
        if (!title || !content) { showToast('Title and content are required', false); return; }

        const url = id ? `/api/admin/rules/${id}` : '/api/admin/rules';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        }).then(r => {
            if (r.ok) { showToast(id ? 'Rule updated!' : 'Rule created!', true); setTimeout(() => location.reload(), 800); }
            else showToast('Save failed', false);
        }).catch(() => showToast('Error saving rule', false));

        ruleModal.hide();
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            deleteTargetId = btn.dataset.id;
            document.getElementById('deleteRuleTitle').textContent = btn.dataset.title;
            deleteModal.show();
        });
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        fetch(`/api/admin/rules/${deleteTargetId}`, { method: 'DELETE' })
            .then(r => {
                if (r.ok) { document.getElementById('rule-' + deleteTargetId)?.remove(); showToast('Rule deleted', true); }
                else showToast('Delete failed', false);
            }).catch(() => showToast('Error deleting', false));
        deleteModal.hide();
    });
</script>
</body>
</html>
